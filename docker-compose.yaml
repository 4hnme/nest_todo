services:
  db:
    image: postgres:15
    env_file:
      - ./db.env
    container_name: tasks_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
  app:
    build: .
    container_name: todo_list
    env_file:
      - ./db.env
    depends_on:
      - db
    ports:
      - "3000:3000"
volumes:
  db_data:
